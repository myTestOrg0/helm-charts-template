suite: Test Grafana dashboard configmap template with CI values
templates:
  - templates/configmap.yaml
values:
  - ../ci-values.yaml
release:
  name: test-grafana-dashboards
  namespace: team-test
tests:
  - it: should not render configmaps when dashboards are not configured
    set:
      configmapsFromFiles: []
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a Grafana dashboard configmap with derived defaults
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: grafana-dashboard-example-dashboard
      - equal:
          path: metadata.namespace
          value: team-test
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
      - equal:
          path: metadata.annotations.grafana_folder
          value: Custom
      - exists:
          path: data["example-dashboard.json"]

  - it: should preserve explicit legacy fields
    documentIndex: 1
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: grafana-dashboard-explicit
      - equal:
          path: metadata.namespace
          value: custom-namespace
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
      - equal:
          path: metadata.labels.team
          value: test-team
      - equal:
          path: metadata.annotations.grafana_folder
          value: Explicit
      - exists:
          path: data["example-dashboard.json"]
