suite: Test PrometheusRule template with CI values
templates:
  - templates/prometheusrule.yaml
values:
  - ../ci-values.yaml
release:
  name: test-alerts
  namespace: team-test
tests:
  - it: should not render PrometheusRule resources when alertRules are not configured
    set:
      alertRules: []
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a PrometheusRule with derived defaults
    documentIndex: 0
    asserts:
      - isKind:
          of: PrometheusRule
      - equal:
          path: metadata.name
          value: example-alert
      - equal:
          path: metadata.namespace
          value: team-test
      - equal:
          path: spec.groups[0].name
          value: example-app
      - equal:
          path: spec.groups[0].rules[0].alert
          value: ExampleAppDown

  - it: should preserve explicit legacy fields
    documentIndex: 1
    asserts:
      - isKind:
          of: PrometheusRule
      - equal:
          path: metadata.name
          value: explicit-alert
      - equal:
          path: metadata.namespace
          value: custom-namespace
