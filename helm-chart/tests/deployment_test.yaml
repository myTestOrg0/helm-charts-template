suite: Test Deployment template with CI Values
templates:
  - templates/deployment.yaml
values:
  - ../ci-values.yaml
release:
  namespace: test-namespace
tests:
  - it: should not render deployment if disabled
    set:
      name: test-app
      deployment:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render deployment with values from ci-values.yaml
    asserts:
      - isKind:
          of: Deployment

      # ─────────────── metadata ───────────────
      - equal:
          path: metadata.name
          value: test-app
      - equal:
          path: metadata.namespace
          value: test-namespace
      - equal:
          path: metadata.annotations.custom-annotation
          value: "true"

      # ─────────────── spec.replicas ───────────────
      - equal:
          path: spec.replicas
          value: 3

      # ─────────────── selector.matchLabels ───────────────
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: test-app

      # ─────────────── template labels ───────────────
      - isNotEmpty:
          path: spec.template.metadata.labels

      - equal:
          path: spec.template.metadata.labels["resource"]
          value: deployment
      # ─────────────── container.image ───────────────
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/test-image:v1.3.0"
      - equal:
          path: spec.template.spec.containers[0].name
          value: container-1

      # ─────────────── command ───────────────
      - equal:
          path: spec.template.spec.containers[0].command[0]
          value: /bin/sh
      - equal:
          path: spec.template.spec.containers[0].command[1]
          value: -ec
      - equal:
          path: spec.template.spec.containers[0].args[0]
          value: . /vault/secrets/app && exec /app/start.sh

      # ─────────────── env ───────────────
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: FEATURE_X_ENABLED
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: "true"
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: NUMERIC_STRING
      - equal:
          path: spec.template.spec.containers[0].env[1].value
          value: "42"

      # ─────────────── serviceAccount ───────────────
      - equal:
          path: spec.template.spec.serviceAccountName
          value: test-sa
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

      # ─────────────── termination period ───────────────
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 40

      # ─────────────── security context ───────────────
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.fsGroupChangePolicy
          value: OnRootMismatch
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          value: ["ALL"]
      - equal:
          path: spec.template.spec.containers[0].securityContext.seccompProfile.type
          value: RuntimeDefault
      - equal:
          path: spec.template.spec.containers[0].securityContext.appArmorProfile.type
          value: RuntimeDefault

      # ─────────────── resources ───────────────
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "500m"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "128Mi"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.ephemeral-storage
          value: "1Gi"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "250m"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "64Mi"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.ephemeral-storage
          value: "512Mi"

      # ─────────────── probes ───────────────
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: 8081
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 2
      - equal:
          path: spec.template.spec.containers[0].startupProbe.periodSeconds
          value: 5
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 8081
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 2
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 5
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /live
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8081
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 2
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 5

      # ─────────────── volumes ───────────────
      - equal:
          path: spec.template.spec.volumes[0].name
          value: data
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: data
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /data

      # ─────────────── strategy ───────────────
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 2
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 2

      # ───────────────── env ─────────────────
      - exists:
          path: spec.template.spec.containers[0].env
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_X_ENABLED
            value: "true"

  - it: should render OpenBao token projection when OpenBao injection is enabled
    set:
      openbao:
        enabled: true
        annotations:
          vault.hashicorp.com/agent-inject: "true"
          vault.hashicorp.com/role: test-role
          vault.hashicorp.com/agent-inject-secret-app: secret/data/test
        serviceAccountToken:
          volumeName: openbao-custom-token
          expirationSeconds: 7200
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - equal:
          path: spec.template.metadata.annotations["vault.hashicorp.com/agent-inject"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["vault.hashicorp.com/agent-service-account-token-volume-name"]
          value: openbao-custom-token
      - contains:
          path: spec.template.spec.volumes
          content:
            name: openbao-custom-token
            projected:
              sources:
                - serviceAccountToken:
                    path: token
                    expirationSeconds: 7200
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: openbao-custom-token
