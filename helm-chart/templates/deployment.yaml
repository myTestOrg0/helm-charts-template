{{- if .Values.deployment.enabled }}
{{- $openbaoTokenVolumeName := dig "serviceAccountToken" "volumeName" "openbao-token" .Values.openbao }}
{{- $openbaoTokenExpirationSeconds := dig "serviceAccountToken" "expirationSeconds" 3600 .Values.openbao }}
{{- $openbaoAnnotations := omit .Values.openbao.annotations "vault.hashicorp.com/agent-service-account-token-volume-name" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    resource: deployment
    {{- include "specific.labels" . | nindent 4 }}
  {{- with .Values.deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        resource: deployment
        {{- include "specific.labels" . | nindent 8 }}
      {{- if .Values.openbao.enabled }}
      annotations:
        {{- with $openbaoAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        vault.hashicorp.com/agent-service-account-token-volume-name: {{ $openbaoTokenVolumeName | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: {{ default false .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
        fsGroupChangePolicy: OnRootMismatch
      containers:
        {{- if .Values.containers }}
        {{- range $i, $c := .Values.containers }}
        {{- $imageName := coalesce ($c.image.name | default $.Values.image.name) }}
        {{- $imageTag := default $.Values.image.tag $c.image.tag }}
        - name: {{ default $.Values.name $c.name }}
          image: {{ if regexMatch "^sha256:[a-fA-F0-9]{64}$" ($imageTag | toString) }}{{ printf "%s@%s" $imageName ($imageTag | toString) | quote }}{{ else }}{{ printf "%s:%s" $imageName ($imageTag | toString) | quote }}{{ end }}
          imagePullPolicy: {{ default "Always" $c.imagePullPolicy }}
          securityContext:
            runAsNonRoot: true
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
            appArmorProfile:
              type: RuntimeDefault
            readOnlyRootFilesystem: {{ default $.Values.securityContext.readOnlyRootFilesystem (and $c.securityContext $c.securityContext.readOnlyRootFilesystem) }}
            {{- with $c.securityContext }}
            {{- with .runAsUser }}
            runAsUser: {{ . }}
            {{- end }}
            {{- with .runAsGroup }}
            runAsGroup: {{ . }}
            {{- end }}
            {{- end }}
          {{- with $c.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- else }}
          resources:
            {{- $.Values.resources | toYaml | nindent 12 }}
          {{- end }}
          {{- if $c.env }}
          env:
            {{- if kindIs "slice" $c.env }}
            {{- toYaml $c.env | nindent 12 }}
            {{- else }}
            {{- range $key, $value := $c.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          {{- else if $c.envMap }}
          env:
            {{- range $key, $value := $c.envMap }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- with $c.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $c.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $c.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $c.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $c.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $c.volumeMounts }}
          volumeMounts:
            {{- toYaml $c.volumeMounts | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- end }}
      {{- if or .Values.volumes .Values.openbao.enabled }}
      volumes:
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.openbao.enabled }}
        - name: {{ $openbaoTokenVolumeName }}
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: {{ $openbaoTokenExpirationSeconds }}
        {{- end }}
      {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.maxSurge }}
      maxUnavailable: {{ .Values.maxUnavailable }}
{{- end }}
